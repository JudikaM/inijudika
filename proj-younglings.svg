  <path d="M356 288l32 32 60-66" fill="none" stroke="#bb86fc" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- wordmark -->
  <text x="400" y="500" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="34" letter-spacing="7" fill="#ffffff">YOUNGLINGS</text>
  <text x="400" y="536" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="14" letter-spacing="4" fill="#b8a6d9">SMART CONTRACT AUDIT</text>
</svg>
